name: Release Build and Test

on:
  push:
    branches:
      - "release/**"
  pull_request:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
  DOCKER_IMAGE: your-org/your-app

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
          cache-dependency-path: "pom.xml"

      - name: Build and test
        run: mvn -B clean verify
        
      - name: Verify version is not SNAPSHOT
        if: github.event_name == 'push'  # Only check on push to release branch
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "Error: Release branch should not contain SNAPSHOT version"
            exit 1
          fi
        id: version

      - name: Set release version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.release_version }} -DgenerateBackupPoms=false

      - name: Create release tag
        id: create_tag
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

          # Create and push the release tag
          git add pom.xml
          git commit -m "Prepare release ${{ steps.version.outputs.release_version }}" || echo "No changes to commit"
          git tag -a v${{ steps.version.outputs.release_version }} -m "Release version ${{ steps.version.outputs.release_version }}" || true
          git push origin v${{ steps.version.outputs.release_version }} || true

          # Push the version update to the release branch
          git push origin HEAD:${{ github.ref_name }} || echo "Push to branch failed, continuing"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: Release v${{ steps.version.outputs.release_version }}
          body: |
            ## Release Notes

            ### New Features
            - 

            ### Bug Fixes
            - 

            ### Changes
            -
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Uncomment and configure if you want to build and push Docker images
      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3

      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       ${{ env.DOCKER_IMAGE }}:latest
      #       ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}

      - name: Bump to next development version
        run: |
          # Update to next development version
          mvn versions:set -DnewVersion=${{ steps.version.outputs.next_version }} -DgenerateBackupPoms=false

          # Commit and push the next development version
          git add pom.xml
          git commit -m "Bump version to ${{ steps.version.outputs.next_version }}"
          git push origin HEAD:${{ github.ref_name }}
