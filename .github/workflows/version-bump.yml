name: Version Bump and Merge

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get current version
        id: version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$CURRENT_VERSION" != *"-SNAPSHOT" ]]; then
            echo "Error: Current version is not a SNAPSHOT version"
            exit 1
          fi
          
          RELEASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
          
          # If version was provided as input, use it
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          fi
          
          # Parse version components
          IFS='.' read -r -a version_parts <<< "${RELEASE_VERSION##v}"
          major="${version_parts[0]}"
          minor="${version_parts[1]}"
          patch="${version_parts[2]}"
          
          # Bump patch version for next development iteration
          NEXT_PATCH=$((patch + 1))
          NEXT_VERSION="$major.$minor.${NEXT_PATCH}-SNAPSHOT"
          
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Create release branch
          git checkout -b release/v${{ steps.version.outputs.release_version }}
          
          # Set release version (remove -SNAPSHOT)
          mvn versions:set -DnewVersion=${{ steps.version.outputs.release_version }} -DgenerateBackupPoms=false
          
          # Commit and push release branch
          git add pom.xml
          git commit -m "Prepare release ${{ steps.version.outputs.release_version }}"
          git push -u origin release/v${{ steps.version.outputs.release_version }}

      - name: Create PR to develop
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: merge release/v${{ steps.version.outputs.release_version }} to develop"
          title: "Merge release/v${{ steps.version.outputs.release_version }} to develop"
          body: |
            This PR merges the release branch back to develop with the next development version.
            
            ### Changes
            - Bump version to ${{ steps.version.outputs.next_version }}
          branch: "develop"
          base: "develop"
          branch-suffix: "short-commit-hash"
          delete-branch: true
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: Release v${{ steps.version.outputs.release_version }}
          body: |
            ## Release Notes

            ### New Features
            - 
            
            ### Bug Fixes
            - 
            
            ### Changes
            -
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
