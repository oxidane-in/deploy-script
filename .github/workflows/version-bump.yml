name: Version Bump and Merge

on:
  push:
    branches:
      - "release/**" # Trigger on any push to release branches
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g., 1.0.0)"
        required: true
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Get and validate current version
        id: version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$CURRENT_VERSION" != *"-SNAPSHOT" ]]; then
            echo "Error: Current version ($CURRENT_VERSION) is not a SNAPSHOT"
            exit 1
          fi
          # Strip “-SNAPSHOT”
          RELEASE_VERSION="${CURRENT_VERSION%-SNAPSHOT}"

          # Optionally override via workflow_dispatch input
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          fi

          # Bump patch for next iteration
          IFS='.' read -r -a parts <<< "${RELEASE_VERSION##v}"
          major="${parts[0]}"
          minor="${parts[1]}"
          patch="${parts[2]}"
          NEXT_PATCH=$((patch + 1))
          NEXT_VERSION="$major.$minor.${NEXT_PATCH}-SNAPSHOT"

          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

          # Create and switch to “release/vX.Y.Z”
          git checkout -b release/v${{ steps.version.outputs.release_version }}

          # Drop “-SNAPSHOT” in pom.xml
          mvn versions:set \
            -DnewVersion=${{ steps.version.outputs.release_version }} \
            -DgenerateBackupPoms=false

          git add pom.xml
          git commit -m "Prepare release ${{ steps.version.outputs.release_version }}"
          git push -u origin release/v${{ steps.version.outputs.release_version }}

      - name: Create PR from “release/…” → “develop”
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: merge ${{ github.ref_name }} → develop"
          title: "Merge ${{ github.ref_name }} into develop"
          body: |
            This PR merges **${{ github.ref_name }}** back into **develop**.  
            Next dev version will be **${{ steps.version.outputs.next_version }}**.

            ### Changes
            - Bump version to ${{ steps.version.outputs.next_version }}
          # HEAD of the PR is the branch we’re already on (e.g. “release/v0.0.2”)
          branch: ${{ github.ref_name }}
          # TARGET is develop
          base: develop
          # Do NOT delete the release branch yet; we want to keep it around
          delete-branch: false
          draft: false

      - name: Auto-merge PR into develop
        if: ${{ steps.create_pr.outputs.pull_request_number }}
        uses: peter-evans/merge-pull-request@v2
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create_pr.outputs.pull_request_number }}
          merge-method: merge # or “squash” / “rebase” as you prefer
